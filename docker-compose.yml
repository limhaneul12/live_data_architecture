services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lda-app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_DB_ADDRESS: postgresql://live_data:live_data@db:5432/live_data
      SERVICE_EVENT_CONSUMER_ENABLED: "true"
      STREAM_REDIS_URL: redis://redis:6379/0
      STREAM_REDIS_MODE: single
      STREAM_BATCH_SIZE: "100"
      STREAM_BLOCK_MS: "1000"
    ports:
      - "${APP_PORT:-8000}:8000"

  event-generator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lda-event-generator
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    command:
      - .venv/bin/python
      - -m
      - event_generator
      - --sink
      - redis
      - --producer-id
      - producer_compose
    environment:
      STREAM_REDIS_URL: redis://redis:6379/0

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lda-frontend
    depends_on:
      app:
        condition: service_started
    env_file:
      - .env
    environment:
      BACKEND_API_BASE_URL: http://app:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  redis:
    image: redis:7-alpine
    container_name: lda-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  db:
    image: postgres:16-alpine
    container_name: lda-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: live_data
      POSTGRES_USER: live_data
      POSTGRES_PASSWORD: live_data
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U live_data -d live_data"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
