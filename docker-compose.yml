services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lda-app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"

  db:
    image: postgres:16-alpine
    container_name: lda-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: live_data
      POSTGRES_USER: live_data
      POSTGRES_PASSWORD: live_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U live_data -d live_data"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
